<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Music Experience</title>
  <style>
    body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
    #player { margin: 20px auto; border: 2px solid #333; display: block; width: 560px; height: 315px; background: #222; }
    .status { font-style: italic; color: #888; }
  </style>
</head>
<body>

<h2>You found this for a reason 🎵 Tap anywhere to start</h2>
<p id="instruction" class="status">Tap anywhere to begin the journey...</p>
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let player;
  const videos = [
    'VEoTd1eWPxw', // dummy first video
    '-kkt9Iraod4', // first real song
    'EY8S83Ug7sI'   // second real song
  ];
  let currentIndex = 0;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '315',
      width: '560',
      videoId: videos[0],
      playerVars: { 'autoplay': 0, 'controls': 0, 'rel': 0 }
    });
  }

  document.body.addEventListener('click', () => {
    if (player && player.playVideo) {
      document.getElementById('instruction').innerText = "Playing...";

      // Start first video (dummy)
      player.loadVideoById(videos[0]);
      player.playVideo();

      // Schedule next videos
      setTimeout(() => {
        currentIndex = 1;
        player.loadVideoById(videos[currentIndex]);
        player.playVideo();
      }, 60000); // 1 minute

      setTimeout(() => {
        currentIndex = 2;
        player.loadVideoById(videos[currentIndex]);
        player.playVideo();
      }, 120000); // 2 minutes total
    }
  }, { once: true });
</script>
</body>
</html>
