<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Music Experience</title>
</head>
<body style="text-align:center; font-family:sans-serif; padding-top:50px;">

  <!-- Optional premium-feel header -->
  <h2>You found this for a reason 🎵 Tap anywhere to play!</h2>

  <!-- Video iframe -->
  <iframe id="video" width="560" height="315"
    src="https://www.youtube.com/embed/GzP7Q8mr7Yg"
    frameborder="0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <!-- Script to handle 3-video timed sequence -->
  <script>
    const video = document.getElementById('video');

    document.body.addEventListener('click', () => {
      // Start Video 1 (dummy)
      video.src = "https://www.youtube.com/embed/GzP7Q8mr7Yg?autoplay=1";

      // After 1 minute → Video 2
      setTimeout(() => {
        video.src = "";

        setTimeout(() => {
          video.src = "https://www.youtube.com/embed/GzP7Q8mr7Yg?autoplay=1";
        }, 500);

      }, 60000);

      // After 2 minutes → Video 3
      setTimeout(() => {
        video.src = "";

        setTimeout(() => {
          video.src = "https://www.youtube.com/embed/EY8S83Ug7sI?autoplay=1";
        }, 500);

      }, 120000);

    }, { once: true });
  </script>

</body>
</html>
