<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Music Experience</title>
  <style>
    body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
    #player { margin-top: 20px; border: 2px solid #333; }
    .status { font-style: italic; color: #888; }
  </style>
</head>
<body>

  <h2>You found this for a reason 🎵</h2>
  <p id="instruction" class="status">Tap anywhere to begin the journey...</p>

  <div id="player"></div>

  <script>
    // 1. Load the YouTube API properly
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com";
    var firstScriptTag = document.getElementsByTagName('script')[0]; // Fixed this line
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let player;
    const videoSequence = [
      'GzP7Q8mr7Yg', // Video 1
      'GzP7Q8mr7Yg', // Video 2 (Triggered after 5 seconds)
      'EY8S83Ug7sI'  // Video 3 (Triggered after 120 seconds)
    ];

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '315',
        width: '560',
        videoId: videoSequence[0], // Start with the first video ID
        playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0 },
        events: { 'onReady': onPlayerReady }
      });
    }

    function onPlayerReady(event) {
      document.body.addEventListener('click', () => {
        document.getElementById('instruction').innerText = "Playing...";
        player.playVideo();

        // Transition 1: After 5 seconds -> Switch to Video 2
        setTimeout(() => {
          player.loadVideoById(videoSequence[1]);
          console.log("Switching to Video 2");

          // Transition 2: After 120 more seconds -> Switch to Video 3
          setTimeout(() => {
            player.loadVideoById(videoSequence[2]);
            console.log("Switching to Video 3");
          }, 120000);

        }, 5000); 

      }, { once: true });
    }
  </script>
</body>
</html>
